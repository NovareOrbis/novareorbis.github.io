    <!-- <meta http-equiv="refresh" content="0; URL='https://novareorbis.github.io/tool-links/'" /> -->
    <meta
      name="google-site-verification"
      content="5TWHIRnfz_zSVrZGOkTaSA27AurBwtIY-yxdCkcMGMk"
    />
    <!-- GitHub Pages SPA: 404.htmlからの ?/path クエリをパスに復元 -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1].replace(/~and~/g, '&') : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6986853665177525"
      crossorigin="anonymous"
    ></script>
