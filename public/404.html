<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA リダイレクトスクリプト
      // パスをクエリパラメータに変換してindex.htmlにリダイレクトする
      var segmentCount = 0;
      var location = window.location;
      var path = location.pathname
        .slice(1)
        .split('/')
        .slice(segmentCount)
        .join('/')
        .replace(/&/g, '~and~');
      var search = location.search
        .slice(1)
        .replace(/&/g, '~and~');

      var query = (path ? '?p=/' + path : '') +
        (search ? (path ? '&q=' : '?q=') + search : '') +
        location.hash;

      location.replace(
        location.protocol + '//' + location.hostname +
        (location.port ? ':' + location.port : '') +
        '/' + query
      );
    </script>
  </head>
  <body>
    リダイレクト中...
  </body>
</html>
